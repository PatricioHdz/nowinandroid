version: "1.0"
ruleGroups:
  - name: "Diagnostic Catch-All"
    conditionExpression:
      key: "errorCode"
      operand: "isNot"
      value: 0
    actions:
      - type: "setErrorCategory"
        value: "UNKNOWN_FAILURE"
      - type: "setErrorMessage"
        value: "[DIAGNOSTICO] Si ves este mensaje, el motor de categorización SI está funcionando."
